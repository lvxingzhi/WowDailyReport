<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>大秘境分数行情</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 幻灯片容器 -->
  <div id="slides-container">

    <!-- Slide 1: 赛季概览 -->
    <section class="slide" id="slide-1">
      <div class="slide-content">
        <div class="season-overview">
          <div class="season-meta">
            <span class="season-title" id="so-season">至暗之夜 S1</span>
            <span class="season-date" id="so-update">07/17 更新</span>
          </div>
          <div class="season-hero">
            <div class="hero-card">
              <div class="hero-value" id="so-week">16</div>
              <div class="hero-label">当前赛季周</div>
            </div>
            <div class="hero-divider"></div>
            <div class="hero-card accent">
              <div class="hero-value" id="so-remaining">5</div>
              <div class="hero-label">剩余周数</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Slide 2: 分数行情趋势 -->
    <section class="slide" id="slide-2">
      <div class="slide-content">
        <div class="slide-label">分数趋势</div>
        <div class="chart-box" id="chart-score-trend"></div>
      </div>
    </section>

    <!-- Slide 3: 第一名高光 -->
    <section class="slide" id="slide-3">
      <div class="slide-content">
        <div class="slide-label">世界第一</div>
        <div class="rank1-highlight">
          <div class="rank1-score" id="r1-score">4418</div>
          <div class="rank1-player">
            <span class="rank1-name" id="r1-player">Рэйвмейв</span>
            <span class="rank1-class" id="r1-class">增辉</span>
          </div>
          <div class="rank1-team" id="r1-team"></div>
        </div>
      </div>
    </section>

    <!-- Slide 4: 国家队生态 -->
    <section class="slide" id="slide-4">
      <div class="slide-content">
        <div class="slide-label">国家队生态</div>
        <div class="eco-grid">
          <div class="eco-left">
            <div class="chart-box chart-box-half" id="chart-pie"></div>
            <div class="eco-stats">
              <div class="stat-card">
                <div class="stat-value accent-gold" id="eco-national">96%</div>
                <div class="stat-label">国家队占比</div>
              </div>
              <div class="stat-card">
                <div class="stat-value accent-orange" id="eco-non-national">4%</div>
                <div class="stat-label">非国家队占比</div>
              </div>
            </div>
          </div>
          <div class="eco-lineup" id="eco-lineup"></div>
        </div>
      </div>
    </section>

    <!-- Slide 5: 信仰专精 -->
    <section class="slide" id="slide-5">
      <div class="slide-content">
        <div class="slide-label">信仰专精追踪</div>
        <div class="faith-cards" id="faith-cards"></div>
      </div>
    </section>

    <!-- Slide 6: 副本限时 -->
    <section class="slide" id="slide-6">
      <div class="slide-content">
        <div class="slide-label">副本限时完成层数</div>
        <div class="chart-box" id="chart-dungeons"></div>
      </div>
    </section>

    <!-- Slide 7: 铁钥匙 -->
    <section class="slide" id="slide-7">
      <div class="slide-content">
        <div class="slide-label">铁钥匙人数趋势</div>
        <div class="chart-box" id="chart-iron"></div>
      </div>
    </section>

  </div>

  <!-- 导航 -->
  <div class="nav">
    <button class="nav-arrow nav-prev" id="nav-prev">&#10094;</button>
    <div class="nav-dots" id="nav-dots"></div>
    <button class="nav-arrow nav-next" id="nav-next">&#10095;</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/charts.js"></script>
</body>
</html>
